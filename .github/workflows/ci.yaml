name: CI-CD

on:
  push:
    branches:
      - main
      - develop
      - 'feat/**'
      - 'feature/**'
      - 'fix/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  PYTHON_VERSION: "3.11"
  AWS_REGION: us-east-1
  ECR_REPOSITORY: togglemaster/${{ github.event.repository.name }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-test:
    name: Build, Unit Tests and Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Instalar dependências da aplicação
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar dependências de teste
        run: |
          if [ -f requirements-test.txt ]; then
            pip install -r requirements-test.txt
          else
            pip install pytest pytest-cov
          fi

      - name: Rodar testes com cobertura
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/testdb
          AUTH_SERVICE_URL: http://auth-service
          PYTHONPATH: .
        run: |
          pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  lint:
    name: Lint and Static Analysis
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Rodar flake8
        continue-on-error: true
        run: |
          flake8 . --exclude=.venv,__pycache__,.pytest_cache,htmlcov

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit

      - name: Rodar Bandit
        continue-on-error: true
        run: |
          bandit -r . -x ./.venv,./tests,./__pycache__,./.pytest_cache

      - name: Scan de filesystem com Trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table

  docker-build:
    name: Docker Build and Image Scan
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .

      - name: Scan da imagem com Trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  docker-push:
    name: Push Image to Amazon ECR
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build da imagem Docker
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .

      - name: Tag da imagem para ECR
        run: |
          docker tag $ECR_REPOSITORY:$IMAGE_TAG \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Push da imagem para ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG
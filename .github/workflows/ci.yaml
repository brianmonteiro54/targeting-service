name: CI-CD

on:
  push:
    branches:
      - main
      - develop
      - "feat/**"
      - "feature/**"
      - "fix/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  PYTHON_VERSION: "3.11"
  TRIVY_VERSION: "v0.70.0"
  AWS_REGION: us-east-1
  ECR_REPOSITORY: togglemaster/${{ github.event.repository.name }}
  IMAGE_TAG: ${{ github.sha }}

# ─────────────────────────────────────────────
# JOB 1 — Testes e cobertura
# ─────────────────────────────────────────────
jobs:
  build-test:
    name: Build, Unit Tests and Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Instalar dependências da aplicação
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar dependências de teste
        run: |
          if [ -f requirements-test.txt ]; then
            pip install -r requirements-test.txt
          else
            pip install pytest pytest-cov
          fi

      - name: Rodar testes com cobertura
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/testdb
          AUTH_SERVICE_URL: http://auth-service
          PYTHONPATH: .
        run: |
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80

      - name: Publicar relatório de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

# ─────────────────────────────────────────────
# JOB 2 — Lint
# ─────────────────────────────────────────────
  lint:
    name: Lint and Static Analysis
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Rodar flake8
        run: |
          flake8 . --exclude=.venv,__pycache__,.pytest_cache,htmlcov

# ─────────────────────────────────────────────
# JOB 3 — Segurança
# ─────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit

      - name: Rodar Bandit
        run: |
          bandit -r . \
            -x ./.venv,./tests,./__pycache__,./.pytest_cache \
            --severity-level high

      - name: Scan de filesystem com Trivy (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs-results.sarif

      - name: Scan de filesystem com Trivy (table legível)
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          output: trivy-fs-results.txt

      - name: Upload resultado Trivy para GitHub Security
        if: always() && hashFiles('trivy-fs-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem

      - name: Upload Trivy filesystem reports (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report-${{ github.run_number }}
          path: |
            trivy-fs-results.sarif
            trivy-fs-results.txt
          retention-days: 30

# ─────────────────────────────────────────────
# JOB 4 — Docker build + scan da imagem
# ─────────────────────────────────────────────
  docker-build:
    name: Docker Build and Image Scan
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar cache Docker (Buildx)
        uses: docker/setup-buildx-action@v3

      - name: Build da imagem Docker (com cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan da imagem com Trivy (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-image-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Scan da imagem com Trivy (table legível)
        if: always()
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: table
          output: trivy-image-results.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload resultado Trivy para GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

      - name: Upload Trivy image reports (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report-${{ github.run_number }}
          path: |
            trivy-image-results.sarif
            trivy-image-results.txt
          retention-days: 30

# ─────────────────────────────────────────────
# JOB 5 — Push para ECR + GitOps deploy
# ─────────────────────────────────────────────
  docker-push:
    name: Push Image to Amazon ECR
    runs-on: ubuntu-latest
    needs: docker-build
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configurar Buildx (reusa cache)
        uses: docker/setup-buildx-action@v3

      - name: Build e push da imagem para ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Atualizar imagem no repo de deploy
        run: |
          FULL_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          git clone https://x-access-token:${{ secrets.DEPLOY_REPO_TOKEN }}@github.com/${{ github.repository_owner }}/deploy-${{ github.event.repository.name }}.git deploy-repo

          cd deploy-repo

          echo "=== ANTES ==="
          grep "image:" manifests/deployment.yaml || true

          sed -i "s|image:.*${{ github.event.repository.name }}:.*|image: ${FULL_IMAGE}|" manifests/deployment.yaml

          echo "=== DEPOIS ==="
          grep "image:" manifests/deployment.yaml || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifests/deployment.yaml

          if git diff --cached --quiet; then
            echo "::warning::Nenhuma alteração detectada no manifesto — a imagem já estava atualizada."
            exit 0
          fi

          git commit -m "deploy: ${{ github.event.repository.name }} ${GITHUB_SHA::8}"
          git push origin main
name: CI-CD

on:
  push:
    branches:
      - main
      - develop
      - "feat/**"
      - "feature/**"
      - "fix/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  PYTHON_VERSION: "3.11"
  AWS_REGION: us-east-1
  ECR_REPOSITORY: togglemaster/${{ github.event.repository.name }}
  IMAGE_TAG: ${{ github.sha }}

# ─────────────────────────────────────────────
# JOB 1 — Testes e cobertura
# ─────────────────────────────────────────────
jobs:
  build-test:
    name: Build, Unit Tests and Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Instalar dependências da aplicação
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar dependências de teste
        run: |
          if [ -f requirements-test.txt ]; then
            pip install -r requirements-test.txt
          else
            pip install pytest pytest-cov
          fi

      - name: Rodar testes com cobertura
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/testdb
          AUTH_SERVICE_URL: http://auth-service
          PYTHONPATH: .
        run: |
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80

      # Mantém o relatório disponível na aba "Summary" do GitHub Actions
      - name: Publicar relatório de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

# ─────────────────────────────────────────────
# JOB 2 — Lint  (bloqueia a pipeline se falhar)
# ─────────────────────────────────────────────
  lint:
    name: Lint and Static Analysis
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Rodar flake8
        run: |
          flake8 . --exclude=.venv,__pycache__,.pytest_cache,htmlcov

# ─────────────────────────────────────────────
# JOB 3 — Segurança  (bloqueia em HIGH/CRITICAL)
# ─────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit
      - name: Rodar Bandit
        run: |
          bandit -r . \
            -x ./.venv,./tests,./__pycache__,./.pytest_cache \
            --severity-level high

      - name: Scan de filesystem com Trivy
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs-results.sarif

      - name: Upload resultado Trivy para GitHub Security
        if: always() && hashFiles('trivy-fs-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem

# ─────────────────────────────────────────────
# JOB 4 — Docker build + scan da imagem
#          A imagem buildada aqui é exportada
#          como artefato para o job de push,
#          evitando rebuild desnecessário.
# ─────────────────────────────────────────────
  docker-build:
    name: Docker Build and Image Scan
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # Cache de camadas Docker entre execuções
      - name: Configurar cache Docker (Buildx)
        uses: docker/setup-buildx-action@v3

      - name: Build da imagem Docker (com cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          # Exporta a imagem para o Docker daemon local
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan da imagem com Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-image-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload resultado Trivy para GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

# ─────────────────────────────────────────────
# JOB 5 — Push para ECR + GitOps deploy
#          Só executa em push/dispatch na main
# ─────────────────────────────────────────────
  docker-push:
    name: Push Image to Amazon ECR
    runs-on: ubuntu-latest
    needs: docker-build
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configurar Buildx (reusa cache)
        uses: docker/setup-buildx-action@v3

      - name: Build e push da imagem para ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── GitOps: atualiza manifesto de deploy ───
      - name: Atualizar imagem no repositório de deploy
        env:
          FULL_IMAGE: "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_REPO_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          SHORT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          git clone "https://x-access-token:${DEPLOY_TOKEN}@github.com/${REPO_OWNER}/deploy-flag-service.git" deploy-repo
          cd deploy-repo

          MANIFEST="manifests/deployment.yaml"

          echo "=== ANTES ==="
          grep "image:" "${MANIFEST}" || true

          sed -i "s|image:.*${{ github.event.repository.name }}:.*|image: ${FULL_IMAGE}|" "${MANIFEST}"

          echo "=== DEPOIS ==="
          grep "image:" "${MANIFEST}" || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${MANIFEST}"

          if git diff --cached --quiet; then
            echo "::warning::Nenhuma alteração detectada no manifesto — a imagem já estava atualizada."
            exit 0
          fi

          git commit -m "deploy: ${{ github.event.repository.name }} ${SHORT_SHA:0:8}"
          git push origin main
apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials
  namespace: togglemaster-targeting
  labels:
    app.kubernetes.io/name: targeting-service
    app.kubernetes.io/component: targeting
    app.kubernetes.io/part-of: togglemaster
type: Opaque
data:
  access-key: ${AWS_ACCESS_KEY_BASE64}
  secret-access-key: ${AWS_SECRET_KEY_BASE64}
  session-token: ${AWS_SESSION_TOKEN_BASE64}

---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secretsmanager-${AWS_REGION}
  namespace: togglemaster-targeting
  labels:
    app.kubernetes.io/name: targeting-service
    app.kubernetes.io/component: targeting
    app.kubernetes.io/part-of: togglemaster
spec:
  provider:
    aws:
      service: SecretsManager
      region: ${AWS_REGION}
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            key: access-key
          secretAccessKeySecretRef:
            name: aws-credentials
            key: secret-access-key
          sessionTokenSecretRef:
            name: aws-credentials
            key: session-token

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: targeting-service-rds
  namespace: togglemaster-targeting
  labels:
    app.kubernetes.io/name: targeting-service
    app.kubernetes.io/component: targeting
    app.kubernetes.io/part-of: togglemaster
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager-${AWS_REGION}
    kind: SecretStore
  target:
    name: targeting-service-rds
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: ${RDS_TARGETING_SECRET_ARN}
        property: username
    - secretKey: password
      remoteRef:
        key: ${RDS_TARGETING_SECRET_ARN}
        property: password

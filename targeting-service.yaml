# ==============================================================================
# TARGETING SERVICE - TEMPLATE
# ==============================================================================
# Descrição: Regras de Targeting (Python)
# Porta: 8004
# ==============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: togglemaster-config
  namespace: togglemaster-targeting
  labels:
    app.kubernetes.io/name: targeting-service
    app.kubernetes.io/component: targeting
    app.kubernetes.io/part-of: togglemaster
data:
  TARGETING_DB_HOST: "${RDS_TARGETING_ENDPOINT}"
  TARGETING_DB_NAME: "${TARGETING_DB_NAME}"
  TARGETING_DB_PORT: "${DB_PORT}"
  AUTH_SERVICE_URL: "${AUTH_SERVICE_URL}"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: targeting-service
  namespace: togglemaster-targeting
  labels:
    app.kubernetes.io/name: targeting-service
    app.kubernetes.io/component: targeting
    app.kubernetes.io/part-of: togglemaster
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: targeting-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: targeting-service
        app.kubernetes.io/component: targeting
        app.kubernetes.io/part-of: togglemaster
    spec:
      initContainers:
        - name: build-db-url
          image: python:3.12-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              python3 << 'EOF'
              import urllib.parse
              import os

              user = os.environ.get('DB_USER', '')
              password = os.environ.get('DB_PASSWORD', '')
              host = os.environ.get('DB_HOST', '')
              port = os.environ.get('DB_PORT', '5432')
              dbname = os.environ.get('DB_NAME', '')

              encoded_user = urllib.parse.quote(user, safe='')
              encoded_password = urllib.parse.quote(password, safe='')

              db_url = f"postgresql://{encoded_user}:{encoded_password}@{host}:{port}/{dbname}?sslmode=require"

              with open('/shared/database_url', 'w') as f:
                  f.write(db_url)

              print(f"DATABASE_URL criada para host: {host}")
              EOF
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: TARGETING_DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: TARGETING_DB_NAME
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: TARGETING_DB_PORT
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: targeting-service-rds
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: targeting-service-rds
                  key: password
          volumeMounts:
            - name: shared-data
              mountPath: /shared

      containers:
        - name: targeting-service
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/targeting-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8004
              protocol: TCP
          command: ["/bin/sh", "-c"]
          args:
            - |
              export DATABASE_URL=$(cat /shared/database_url)
              exec python app.py
          env:
            - name: PORT
              value: "8004"
            - name: APP_ENV
              value: "production"
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: AUTH_SERVICE_URL
          volumeMounts:
            - name: shared-data
              mountPath: /shared
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 15
            periodSeconds: 20

      volumes:
        - name: shared-data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: targeting-service
  namespace: togglemaster-targeting
  labels:
    app.kubernetes.io/name: targeting-service
    app.kubernetes.io/component: targeting
    app.kubernetes.io/part-of: togglemaster
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: targeting-service
  ports:
    - name: http
      port: 8004
      targetPort: 8004
      protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: targeting-service-ingress
  namespace: togglemaster-targeting
  labels:
    app.kubernetes.io/name: targeting-service
    app.kubernetes.io/component: targeting
    app.kubernetes.io/part-of: togglemaster
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: ${DOMAIN_NAME}
      http:
        paths:
          - path: /targeting(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: targeting-service
                port:
                  number: 8004
